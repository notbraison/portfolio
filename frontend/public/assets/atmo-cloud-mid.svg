<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
    <radialGradient id="m1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(750 420) rotate(8) scale(620 260)">
      <stop offset="0" stop-color="white" stop-opacity="0.92"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="m2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 510) rotate(-5) scale(360 180)">
      <stop offset="0" stop-color="white" stop-opacity="0.78"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="m3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 500) rotate(12) scale(420 190)">
      <stop offset="0" stop-color="white" stop-opacity="0.8"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#blur)">
    <ellipse cx="750" cy="420" rx="620" ry="260" fill="url(#m1)"/>
    <ellipse cx="360" cy="510" rx="360" ry="180" fill="url(#m2)"/>
    <ellipse cx="1240" cy="500" rx="420" ry="190" fill="url(#m3)"/>
